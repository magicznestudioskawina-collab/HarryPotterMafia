<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hogwarts Mafia - Studio Skawina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: linear-gradient(rgba(10, 10, 25, 0.9), rgba(10, 10, 25, 0.9)), 
                        url('https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=1000') no-repeat center center fixed; 
            background-size: cover;
            color: #f0e68c; 
            font-family: 'Fauna One', serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Zapobiega przesuwaniu strony */
        }

        header { padding: 10px 0; flex-shrink: 0; }
        
        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 7vw; /* Rozmiar zależny od szerokości ekranu */
            max-size: 2.5em;
            text-shadow: 0 0 15px #e94560; 
            margin: 0; 
        }

        .instruction { font-size: 0.8em; color: #d4af37; margin: 5px 0; }

        /* RESPONSYWNA KARTA */
        .card { 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/old-paper.png');
            border: 6px double #4a3728; 
            margin: 10px auto; 
            width: 90%;
            flex-grow: 1; /* Zajmuje całą dostępną przestrzeń */
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            color: #2b1e16;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #role-icon { 
            font-size: 25vw; /* Ikona dopasowana do ekranu */
            max-font-size: 150px;
            margin-bottom: 5px; 
        }

        #role-name { 
            font-family: 'Cinzel', serif; 
            font-size: 8vw; 
            max-font-size: 2.5em;
            margin: 5px 0; 
            color: #4a0000;
        }

        #role-desc { 
            font-size: 4.5vw; 
            max-font-size: 1.2em;
            line-height: 1.3; 
            font-weight: bold;
        }

        footer { padding: 15px; flex-shrink: 0; }

        button { 
            background: #4a0000; 
            color: #f0e68c; 
            border: 2px solid #d4af37; 
            padding: 15px 0; 
            border-radius: 30px; 
            cursor: pointer; 
            font-family: 'Cinzel', serif; 
            font-size: 1.2em; 
            width: 85%;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .death-eater {
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.7) !important;
            background-color: #3d0a0a !important;
            color: #ff4444 !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hogwarts Mafia</h1>
        <p class="instruction">Dotknij pergaminu, by poznać los...</p>
    </header>
    
    <div class="card" id="mainCard">
        <div id="content-before">
            <span style="font-size: 20vw;">⏳</span>
            <h2>Czekaj...</h2>
            <p>Trwa przydzielanie ról przez Tiarę.</p>
        </div>
        <div id="content-after" style="display: none; width: 100%;">
            <span id="role-icon">❓</span>
            <h2 id="role-name">Rola</h2>
            <p id="role-desc">Opis...</p>
        </div>
    </div>

    <footer>
        <button onclick="startGame()">TIARA PRZYDZIAŁU</button>
    </footer>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        
        const roleData = {
            'Harry Potter (Auror)': { icon: '⚡', desc: 'Lider Zakonu. Co noc sprawdzasz, czy ktoś służy Czarnemu Panu.' },
            'Ron Weasley (Straznik)': { icon: '🍗', desc: 'Chronisz przyjaciół. Wybierz osobę bezpieczną tej nocy.' },
            'Smierciozerca (Mafia)': { icon: '💀', desc: 'Służysz Voldemortowi. Wyeliminujcie wszystkich czarodziejów!' },
            'Uczeń Hogwartu': { icon: '🏰', desc: 'Obserwuj i głosuj w dzień. Znajdź zdrajców ukrytych w zamku!' },
            'Severus Snape (Szpieg)': { icon: '🧪', desc: 'Sprawdzasz role innych. Jeśli Harry zginie, przegrywasz.' }
        };

        function startGame() {
            socket.emit('start-game');
        }

        socket.on('assign-role', (role) => {
            document.getElementById('content-before').style.display = 'none';
            document.getElementById('content-after').style.display = 'block';
            
            const data = roleData[role] || { icon: '🧙‍♂️', desc: 'Twoje przeznaczenie jest niejasne...' };
            
            document.getElementById('role-icon').innerText = data.icon;
            document.getElementById('role-name').innerText = role;
            document.getElementById('role-desc').innerText = data.desc;

            if(role.includes('Smierciozerca')) {
                document.getElementById('mainCard').classList.add('death-eater');
            } else {
                document.getElementById('mainCard').classList.remove('death-eater');
            }
        });
    </script>
</body>
</html>

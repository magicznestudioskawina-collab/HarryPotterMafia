<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hogwarts Mafia - Studio Skawina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(10, 10, 25, 0.85), rgba(10, 10, 25, 0.85)), 
                        url('https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=1000') no-repeat center center fixed; 
            background-size: cover;
            color: #f0e68c; 
            font-family: 'Fauna One', serif; 
            text-align: center; 
            margin: 0; padding: 15px;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 2.2em; text-shadow: 0 0 15px #e94560; margin: 10px 0; }

        .card { 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/old-paper.png');
            border: 6px double #4a3728; 
            padding: 25px; 
            margin: 20px auto; 
            max-width: 320px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            color: #2b1e16;
            min-height: 250px;
            display: flex; flex-direction: column; justify-content: center;
        }

        #role-icon { font-size: 4em; margin-bottom: 10px; display: block; }
        #role-name { font-family: 'Cinzel', serif; font-size: 1.8em; margin: 5px 0; color: #4a0000; }
        #role-desc { font-style: italic; font-size: 1em; line-height: 1.4; }

        .instruction { font-size: 0.9em; color: #d4af37; margin-bottom: 20px; }

        button { 
            background: #4a0000; color: #f0e68c; border: 2px solid #d4af37; 
            padding: 15px 35px; border-radius: 30px; cursor: pointer; 
            font-family: 'Cinzel', serif; font-size: 1em; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h1>Hogwarts Mafia</h1>
    <p class="instruction">Zabierz telefon do lochów i czekaj na przydział...</p>
    
    <div class="card" id="mainCard">
        <div id="content-before">
            <span style="font-size: 5em;">⏳</span>
            <h2>Oczekiwanie...</h2>
            <p>Aż Mistrz Gry (Niziurski) obudzi Tiarę Przydziału.</p>
        </div>
        <div id="content-after" style="display: none;">
            <span id="role-icon">❓</span>
            <h2 id="role-name">Rola</h2>
            <p id="role-desc">Opis...</p>
        </div>
    </div>

    <button onclick="startGame()">TIARA PRZYDZIAŁU</button>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        
        const roleData = {
            'Harry Potter (Auror)': {
                icon: '⚡',
                desc: 'Jesteś liderem Zakonu. Co noc możesz sprawdzić jedną osobę, czy służy Czarnemu Panu. Musisz wyeliminować Mafię przed świtem.'
            },
            'Ron Weasley (Straznik)': {
                icon: '🍗',
                desc: 'Twój urok osobisty chroni przyjaciół. Wybierz jedną osobę, która tej nocy będzie bezpieczna przed zaklęciem Śmierciożerców.'
            },
            'Smierciozerca (Mafia)': {
                icon: '💀',
                desc: 'Służysz Lordowi Voldemortowi. Razem z innymi Śmierciożercami wybierz ofiarę i wyeliminuj wszystkich czarodziejów czystej krwi.'
            },
            'Uczeń Hogwartu': {
                icon: '🏰',
                desc: 'Jesteś zwykłym uczniem. Twoją jedyną bronią jest głosowanie w ciągu dnia. Obserwuj uważnie i znajdź zdrajców!'
            },
            'Severus Snape (Szpieg)': {
                icon: '🧪',
                desc: 'Twoje intencje są niejasne. Możesz sprawdzić rolę gracza, ale jeśli zginie Harry, przegrywasz razem z nim.'
            }
        };

        function startGame() {
            socket.emit('start-game');
        }

        socket.on('assign-role', (role) => {
            document.getElementById('content-before').style.display = 'none';
            document.getElementById('content-after').style.display = 'block';
            
            const data = roleData[role] || { icon: '🧙‍♂️', desc: 'Nieznane przeznaczenie...' };
            
            document.getElementById('role-icon').innerText = data.icon;
            document.getElementById('role-name').innerText = role;
            document.getElementById('role-desc').innerText = data.desc;

            // Zmiana klimatu karty dla Mafii
            if(role.includes('Smierciozerca')) {
                document.getElementById('mainCard').style.boxShadow = "0 0 30px rgba(255, 0, 0, 0.5)";
                document.getElementById('role-name').style.color = "#8b0000";
            }
        });
    </script>
</body>
</html>

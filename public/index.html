<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Potyczka w Hogwarcie - Studio Skawina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Fauna+One&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { 
            background: #0a0a19; color: #f0e68c; font-family: 'Fauna One', serif; 
            margin: 0; text-align: center; overflow-x: hidden;
        }
        .main-screen { padding: 40px; display: none; }
        .player-screen { padding: 20px; display: none; }
        h1 { font-family: 'Cinzel'; font-size: 3rem; color: #e94560; }
        .qr-area { background: white; padding: 20px; display: inline-block; border-radius: 10px; margin: 20px; }
        .player-card { 
            background: #f4e4bc; color: #2b1e16; border: 5px double #4a3728;
            padding: 30px; border-radius: 15px; max-width: 350px; margin: 20px auto;
        }
        .btn-start { 
            background: #4a0000; color: #f0e68c; border: 2px solid #d4af37;
            padding: 20px 50px; font-family: 'Cinzel'; font-size: 1.5rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- EKRAN GŁÓWNY (KOMPUTER) -->
    <div id="screen-main" class="main-screen">
        <h1>Witaj w grze: Potyczka w Hogwarcie</h1>
        <div class="qr-area" id="qrcode">
            <!-- Tutaj wstaw obrazek kodu QR który wygenerowałeś wcześniej -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://harrypottermafia.onrender.com" alt="QR Code">
        </div>
        <h3>Dołączyli czarodzieje:</h3>
        <div id="player-list" style="font-size: 1.5rem; margin-bottom: 30px;">Czekam na graczy...</div>
        <button class="btn-start" onclick="startIntrigue()">ROZPOCZNIJ INTRYGĘ</button>
    </div>

    <!-- EKRAN GRACZA (TELEFON) -->
    <div id="screen-player" class="player-screen">
        <div id="join-form">
            <h2>Wpisz swoje imię:</h2>
            <input type="text" id="playerName" style="padding: 10px; font-size: 1.2rem;"><br><br>
            <button class="btn-start" onclick="joinGame()">WEJDŹ DO GRY</button>
        </div>
        <div id="role-card" class="player-card" style="display:none;">
            <h2 id="r-name">Twoja Rola</h2>
            <p id="r-desc">Opis...</p>
        </div>
    </div>

    <audio id="introVoice" src="https://api.elevenlabs.io/v1/text-to-speech/cyrillic_voice_id/stream"></audio>

    <script>
        const socket = io();
        const isMobile = /iPhone|Android/i.test(navigator.userAgent);

        if (isMobile) {
            document.getElementById('screen-player').style.display = 'block';
        } else {
            document.getElementById('screen-main').style.display = 'block';
        }

        function joinGame() {
            const name = document.getElementById('playerName').value;
            socket.emit('join-game', name);
            document.getElementById('join-form').style.display = 'none';
        }

        function startIntrigue() {
            socket.emit('start-intrigue');
            const msg = new SpeechSynthesisUtterance("Niech rozpocznie się intryga!");
            msg.lang = 'pl-PL';
            window.speechSynthesis.speak(msg);
        }

        socket.on('assign-role', (player) => {
            document.getElementById('role-card').style.display = 'block';
            document.getElementById('r-name').innerText = player.role;
            // Tutaj możesz dodać resztę opisów ról...
        });

        socket.on('update-player-list', (players) => {
            document.getElementById('player-list').innerText = players.map(p => p.name).join(", ");
        });
    </script>
</body>
</html>

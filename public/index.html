<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hogwarts Mafia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a2e; color: #e94560; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #e94560; padding: 30px; margin: 40px auto; max-width: 300px; border-radius: 20px; background: #16213e; box-shadow: 0 0 20px rgba(233, 69, 96, 0.4); }
        button { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Hogwarts Mafia</h1>
    <div class="card">
        <h3>Twoja Rola:</h3>
        <h2 id="role">Oczekiwanie...</h2>
    </div>
    <button onclick="startGame()">TIARA PRZYDZIAŁU</button>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io(); // Na Renderze to automatycznie znajdzie serwer
        const roleText = document.getElementById('role');

        function startGame() {
            socket.emit('start-game');
        }

        socket.on('assign-role', (role) => {
            roleText.innerText = role;
        });
    </script>
</body>
</html>

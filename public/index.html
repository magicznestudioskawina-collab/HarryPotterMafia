<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Potyczka w Hogwarcie - Studio Skawina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Fauna+One&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* Twoje poprzednie style z poprawkami kontrastu */
        body { background: #050510; color: #f0e68c; font-family: 'Fauna One', serif; margin: 0; text-align: center; }
        #screen-main, #screen-night { min-height: 100vh; display: none; padding: 5vh 20px; }
        h1 { font-family: 'Cinzel'; font-size: 3rem; color: #e94560; text-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
        .player-card { 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/old-paper.png');
            color: #2b1e16; border: 8px double #4a3728; padding: 30px; border-radius: 20px;
            max-width: 360px; margin: 20px auto; box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }
        .dark-side { background-color: #1a0505 !important; color: #fff !important; border-color: #ff0000 !important; }
        .dark-side .role-name { color: #ff4444 !important; }
        button { background: #4a0000; color: #f0e68c; border: 2px solid #d4af37; padding: 20px 50px; font-family: 'Cinzel'; border-radius: 50px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="screen-main">
        <h1>Potyczka w Hogwarcie</h1>
        <div style="background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 20px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://harrypottermafia.onrender.com" alt="QR">
        </div>
        <div id="player-list" style="margin: 20px; font-size: 1.2rem;"></div>
        <button onclick="startIntrigue()">NIECH ROZPOCZNIE SIĘ INTRYGA</button>
    </div>

    <div id="screen-night">
        <h1 style="color: #ff0000; font-size: 4rem;">🌙 NOC ZAPADŁA</h1>
        <h2 style="font-family: 'Cinzel'">Śmierciożercy szykują Avada Kedavra...</h2>
        <div id="night-players"></div>
    </div>

    <div id="screen-player">
        <div id="join-section" style="padding: 40px;">
            <input type="text" id="pName" placeholder="Twoje Imię..." style="padding: 15px; width: 80%; margin-bottom: 20px; border-radius: 10px;">
            <button onclick="join()">DOŁĄCZ</button>
        </div>
        <div id="player-card" class="player-card" style="display:none;">
            <span style="font-size: 5rem;" id="r-icon"></span>
            <h2 class="role-name" id="r-name"></h2>
            <p id="r-desc" style="font-weight: bold;"></p>
        </div>
    </div>

    <script>
        const socket = io();
        const isMobile = /iPhone|Android/i.test(navigator.userAgent);
        
        document.getElementById(isMobile ? 'screen-player' : 'screen-main').style.display = 'block';

        function join() {
            const n = document.getElementById('pName').value;
            if(n) { socket.emit('join-game', n); document.getElementById('join-section').style.display = 'none'; }
        }

        function startIntrigue() { socket.emit('start-intrigue'); }

        socket.on('assign-role', (p) => {
            const card = document.getElementById('player-card');
            card.style.display = 'block';
            document.getElementById('r-icon').innerText = p.icon;
            document.getElementById('r-name').innerText = p.role;
            document.getElementById('r-desc').innerText = p.desc;
            if(p.role.match(/Voldemort|Smierciozerca|Bellatrix/)) card.classList.add('dark-side');
        });

        socket.on('update-player-list', (players) => {
            document.getElementById('player-list').innerHTML = players.map(p => `<span>${p.name}</span>`).join(" | ");
        });

        socket.on('transition-to-night', () => {
            // Klimatyczny głos
            const msg = new SpeechSynthesisUtterance("Niech rozpocznie się intryga! Noc zapadła nad Hogwartem. Śmierciożercy, szykujcie różdżki do Avada Kedavra.");
            msg.lang = 'pl-PL';
            msg.pitch = 0.6; // Niższy głos
            msg.rate = 0.8;  // Wolniejszy głos
            window.speechSynthesis.speak(msg);

            if(!isMobile) {
                document.getElementById('screen-main').style.display = 'none';
                document.getElementById('screen-night').style.display = 'block';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziedzictwo Smoka: Mafia</title>
    <style>
        :root {
            --gold: #d4af37;
            --dragon-blood: #8b0000;
            --magic-blue: #00d4ff;
        }
        body { 
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            font-family: 'Cinzel', serif; /* Możesz dodać Google Fonts */
            text-align: center;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .dragon-frame {
            border: 3px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 50px var(--dragon-blood);
            max-width: 90%;
            position: relative;
        }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 5px; }
        #role-box { 
            font-size: 2.5em; 
            margin: 20px 0; 
            min-height: 80px;
            text-shadow: 0 0 20px var(--magic-blue);
        }
        button {
            background: var(--dragon-blood);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }
        .aura { position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 1px solid var(--magic-blue); opacity: 0.3; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.1; } 50% { opacity: 0.5; } 100% { opacity: 0.1; } }
    </style>
</head>
<body>
    <div class="dragon-frame">
        <div class="aura"></div>
        <h1>Studio Skawina</h1>
        <p>Dotknij Khaela, by poznać swoje przeznaczenie...</p>
        <div id="role-box">???</div>
        <button onclick="revealRole()">KRONA-VIELLE!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const roleBox = document.getElementById('role-box');

        function revealRole() {
            roleBox.innerText = "Zaklinanie...";
            socket.emit('start-game');
        }

        socket.on('assign-role', (role) => {
            // Efekt "smoczego ognia" przy otrzymaniu roli
            roleBox.style.color = role.includes('Smierciozerca') ? 'red' : '#00d4ff';
            roleBox.innerText = role;
        });
    </script>
</body>
</html>

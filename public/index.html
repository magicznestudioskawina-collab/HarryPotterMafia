<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hogwarts Mafia - Studio Skawina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: linear-gradient(rgba(10, 10, 25, 0.9), rgba(10, 10, 25, 0.9)), 
                        url('https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=1000') no-repeat center center fixed; 
            background-size: cover;
            color: #f0e68c; 
            font-family: 'Fauna One', serif; 
            text-align: center; 
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { flex: 0 0 auto; padding: 10px 0; }
        h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; text-shadow: 0 0 10px #e94560; margin: 0; }

        /* KARTA Z OGRANICZENIEM WYSOKOŚCI */
        .card-container {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .card { 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/old-paper.png');
            border: 5px double #4a3728; 
            width: 100%;
            max-width: 350px;
            max-height: 90%; /* Zapewnia miejsce na przycisk pod kartą */
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            color: #2b1e16;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            padding: 20px;
        }

        #role-icon { font-size: 4rem; margin-bottom: 5px; }
        #role-name { font-family: 'Cinzel', serif; font-size: 1.6rem; color: #4a0000; margin: 5px 0; }
        #role-desc { font-size: 1rem; line-height: 1.3; font-weight: bold; }

        footer { flex: 0 0 auto; padding: 20px; }

        button { 
            background: #4a0000; 
            color: #f0e68c; 
            border: 2px solid #d4af37; 
            padding: 15px 30px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-family: 'Cinzel', serif; 
            font-size: 1.1rem; 
            width: 100%;
            max-width: 300px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .death-eater {
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7) !important;
            background-color: #3d0a0a !important;
            color: #ff4444 !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hogwarts Mafia</h1>
    </header>
    
    <div class="card-container">
        <div class="card" id="mainCard">
            <div id="content-before">
                <span style="font-size: 4rem;">⏳</span>
                <h2>Czekaj...</h2>
                <p>Tiara zaraz przydzieli role.</p>
            </div>
            <div id="content-after" style="display: none;">
                <span id="role-icon">❓</span>
                <h2 id="role-name">Rola</h2>
                <p id="role-desc">Opis...</p>
            </div>
        </div>
    </div>

    <footer>
        <button onclick="startGame()">TIARA PRZYDZIAŁU</button>
    </footer>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        const roleData = {
            'Harry Potter (Auror)': { icon: '⚡', desc: 'Lider Zakonu. Co noc sprawdzasz, czy ktoś służy Czarnemu Panu.' },
            'Ron Weasley (Straznik)': { icon: '🍗', desc: 'Chronisz przyjaciół. Wybierz osobę bezpieczną tej nocy.' },
            'Smierciozerca (Mafia)': { icon: '💀', desc: 'Służysz Voldemortowi. Wyeliminujcie wszystkich czarodziejów!' },
            'Uczeń Hogwartu': { icon: '🏰', desc: 'Obserwuj i głosuj w dzień. Znajdź zdrajców ukrytych w zamku!' },
            'Severus Snape (Szpieg)': { icon: '🧪', desc: 'Sprawdzasz role innych. Jeśli Harry zginie, przegrywasz.' }
        };

        function startGame() { socket.emit('start-game'); }

        socket.on('assign-role', (role) => {
            document.getElementById('content-before').style.display = 'none';
            document.getElementById('content-after').style.display = 'block';
            const data = roleData[role] || { icon: '🧙‍♂️', desc: 'Nieznane przeznaczenie...' };
            document.getElementById('role-icon').innerText = data.icon;
            document.getElementById('role-name').innerText = role;
            document.getElementById('role-desc').innerText = data.desc;
            if(role.includes('Smierciozerca')) {
                document.getElementById('mainCard').classList.add('death-eater');
            } else {
                document.getElementById('mainCard').classList.remove('death-eater');
            }
        });
    </script>
</body>
</html>
